<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>CAPS SVG Loader</title>
  <style>
    /* Lock screen and disable scrolling/pinch-zoom */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* For touch devices */
    }

    /* Main content placeholder */
    #content {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom right, #add8e6, #87cefa);
      z-index: 1;
      opacity: 0; /* Initially hidden */
      transition: opacity .3s ease; /* Fade in after loader finishes */
    }
    
    #content.visible {
      opacity: 1;
    }

    #content h1 {
      color: navy;
      font-size: 2rem;
      margin: 0;
    }

    /* Loader overlay */
    #loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at center, #f8f4ef 0%, #e0d6c5 100%);
      z-index: 9999;
    }

    /* SVG container - Reduced Size */
    #loader-svg {
      width: 8.544rem; 
      height: 8rem;
      transform-origin: center center;
    }

    /* Common setup for paths that will be drawn */
    #path1, #path2 {
      fill-opacity: 0;
      stroke-width: 5; 
      stroke-dasharray: 6000; 
      stroke-dashoffset: 6000;
      transition: all 0.5s ease;
    }
    
    /* Specific setup for paths that will NOT be drawn */
    #path3, #path4, #path5 {
      stroke: none;
      opacity: 0; /* Hidden until their animation starts */
      transition: all 0.5s ease;
    }

    /* --- REVISED ANIMATION STORY (from your edit) --- */

    /* Path1 (House Outline): Draws first, slower. */
    #path1.animate {
      stroke: #EB7B25; 
      animation:
        draw 2.5s ease-out forwards 0.2s,
        fill 0.5s ease forwards 2.7s;
    }

    /* Path2 (House Inner Detail): Draws second, slower. */
    #path2.animate {
      stroke: #EB7B25;
       animation:
        draw 2.0s ease-out forwards 0.7s, /* Starts while path1 is still drawing */
        fill 0.5s ease forwards 2.7s;
    }
    
    /* Path4 (Spoon) & Path5 (Fork): Slide up fully formed. */
    #path4.animate {
      transform: translateY(110px); /* Set initial position for slide */
      animation: slideUp 1s cubic-bezier(0.5,1.2,0.2,1.05) forwards 3.0s;
    }
    #path5.animate {
      transform: translateY(110px); /* Set initial position for slide */
      animation: slideUp 1s cubic-bezier(0.5,1.2,0.2,1.05) forwards 2.8s;
    }
    
    /* Path3 (Circle/Logo): Scales in at the end. */
    #path3.animate {
      transform-origin: center; /* Ensure scaling happens from the center */
      transform: scale(1.2); /* Set initial scale for the effect */
      animation: scaleIn 0.5s cubic-bezier(0.95,1.2,0.2,1.05) forwards 3.5s;
    }

    /* --- KEYFRAMES --- */
    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }
    @keyframes fill {
      to { fill-opacity: 1; }
    }
    @keyframes slideUp {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    @keyframes scaleIn {
        to {
            opacity: 1;
            transform: scale(1);
        }
    }
    
    /* Loader container fade-out at the very end */
    #loader.fade-out {
       animation: fadeOut 0.6s ease forwards 0s; /* Delay is handled by JS */
    }

    @keyframes fadeOut {
      from { opacity: 1;  }
      to { opacity: 0;  }
    }
  </style>
</head>

    <h1>Welcome to the Website!</h1>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // --- Configuration ---
      const MIN_ANIMATION_TIME = 4500; // 6 seconds
      
      // --- State Variables ---
      let isPageFullyLoaded = false;

      // --- DOM Elements ---
      const loader = document.getElementById('loader');
      const content = document.getElementById('content');
      const paths = document.querySelectorAll('#caps-logo-stroke path');
      
      // --- Functions ---
      
      /**
       * Triggers the fade-out animation and cleans up the loader.
       */
      function fadeOutLoader() {
        if (!loader) return;
        
        loader.classList.add('fade-out');

        setTimeout(() => {
          content.classList.add('visible');
        }, 200);
        
        // Wait for the fade-out animation to finish before removing the element
        loader.addEventListener('animationend', () => {
          if (loader) {
            loader.remove();
          }
        });
      }
      
      /**
       * Removes and re-adds the 'animate' class to all paths to restart CSS animations.
       */
      function runAnimationCycle() {
        // Remove 'animate' class to reset all animations
        paths.forEach(path => path.classList.remove('animate'));
        
        // This is a trick to force the browser to reflow, ensuring animations restart
        // when the class is re-added immediately.
        void loader.offsetWidth; 

        resetLoader();
        
        // Add 'animate' class back to start the animations
        paths.forEach(path => path.classList.add('animate'));
        
        // Set a timer to check if we should exit or loop after the animation cycle
        setTimeout(checkCompletion, MIN_ANIMATION_TIME);
      }
      
      /**
       * Checks if the page has loaded. If yes, exits the loader. If not, loops the animation.
       */
      function checkCompletion() {
        if (isPageFullyLoaded) {
          fadeOutLoader();
        } else {
          // If the page still hasn't loaded after 6 seconds, run the animation again.
          runAnimationCycle();
        }
      }

      function resetLoader() {
        const path1 = document.getElementById('path1');
        const path2 = document.getElementById('path2');
        const path3 = document.getElementById('path3');
        const path4 = document.getElementById('path4');
        const path5 = document.getElementById('path5');

        path1.style.fillOpacity = 0;
        path2.style.fillOpacity = 0;

        path1.style.strokeWidth = 5;
        path2.style.strokeWidth = 5;
        
        path1.style.strokeDashoffset = 6000;
        path2.style.strokeDashoffset = 6000;
        
        path1.style.strokeDasharray = 6000;
        path2.style.strokeDasharray = 6000;

        path3.style.stroke = "none";
        path4.style.stroke = "none";
        path5.style.stroke = "none";
             
        path3.style.opacity = 0; /* Hidden until their animation starts */
        path4.style.opacity = 0; /* Hidden until their animation starts */
        path5.style.opacity = 0; /* Hidden until their animation starts */

        path3.style.transform = "scale(1.1)"; /* Hidden until their animation starts */

      }
      
      // --- Initialisation ---
      
      // Set a flag when the window's load event fires.
      window.addEventListener('load', () => {
        isPageFullyLoaded = true;
      });
 

      // Kick off the very first animation cycle when the DOM is ready.
      runAnimationCycle();
    });
  </script>
