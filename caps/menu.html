<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Caps - Menu</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- GSAP Core and ScrollTrigger Plugin CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    
    <!-- Swiper.js CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <!-- Phosphor Icons CDN -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Commissioner:wght@300;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <style>
        /* --- FONT & THEME STYLES --- */
        body {
            background-color: #f8fafc; /* bg-slate-50 */
            color: #1f2937; /* bg-gray-800 */
            overflow-x: hidden;
        }
        .font-commissioner { font-family: 'Commissioner', sans-serif; }
        .font-cinzel { font-family: 'Cinzel', serif; }
        .font-dancing-script { font-family: 'Dancing Script', cursive; }

        /* --- ICON WALL ART BACKGROUND --- */
        .icon-wallpaper {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden; z-index: -1;
        }
        .icon-wallpaper i {
            position: absolute; color: #e2e8f0; opacity: 0.8; z-index: -1;
        }

        /* --- STYLING OVERHAUL --- */
        .filter-swiper .swiper-slide { width: auto; }
        
        /* Cuisine Filter Style (Outlined Rectangles) */
        .cuisine-btn {
            padding: 0.5rem 1.25rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.5rem; /* 8px */
            transition: all 0.2s ease-in-out;
        }
        .cuisine-btn.active {
            border-color: #4f46e5; /* indigo-600 */
            background-color: #eef2ff; /* indigo-50 */
            color: #4338ca; /* indigo-700 */
            font-weight: 700;
        }

        /* Category Filter Style (Colorful Pills) */
        .category-btn {
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
        }
        .category-btn.active {
            background-image: linear-gradient(to right, #4f46e5, #7c3aed);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }
        
        /* Veg Toggle Switch */
        .veg-toggle-label { transition: background-color 0.3s ease; }
        #veg-toggle:checked + .veg-toggle-label { background-color: #16a34a; /* green-600 */ }
        #veg-toggle:checked + .veg-toggle-label .veg-toggle-dot {
            transform: translateX(100%);
            background-color: white;
        }
        
        /* Decorative Menu Titles */
        .menu-category-title {
            display: flex; align-items: center; text-align: center;
        }
        .menu-category-title::before, .menu-category-title::after {
            content: ''; flex-grow: 1; border-bottom: 2px solid #e2e8f0;
        }
        .menu-category-title:not(:empty)::before { margin-right: 1.5rem; }
        .menu-category-title:not(:empty)::after { margin-left: 1.5rem; }
    </style>
</head>
<body class="antialiased font-commissioner">

    <main id="component-container" class="relative">
        
        <div class="icon-wallpaper">
            <i class="ph-duotone ph-coffee text-8xl" style="top: 5%; left: 5%;"></i>
            <i class="ph-duotone ph-wine text-7xl" style="top: 15%; right: 8%;"></i>
            <i class="ph-duotone ph-knife text-6xl" style="top: 40%; left: 10%;"></i>
            <i class="ph-duotone ph-fish-simple text-8xl" style="top: 60%; right: 12%;"></i>
        </div>

        <section id="menu-header" class="relative text-center px-4 sm:px-6 lg:px-8 pt-24 md:pt-32 pb-16">
            <div class="relative z-10 flex flex-col items-center">
                <img src="https://sparklingspur.github.io/images/caps-solid-logo.png" alt="Hotel Caps Logo" class="h-20 w-20 mb-4" onerror="this.style.display='none'">
                <div class="font-commissioner text-gray-800">
                    <span class="text-lg font-light tracking-widest">HOTEL</span>
                    <h1 class="text-4xl font-bold tracking-wider">CAPS</h1>
                </div>
                <div class="my-8"><p class="font-dancing-script text-3xl md:text-4xl text-teal-600">Multi-Cuisine Restaurant</p></div>
                <div class="font-cinzel text-gray-900"><h2 class="text-5xl md:text-6xl lg:text-7xl tracking-widest">MENU</h2></div>
            </div>
        </section>

        <section id="bestsellers-section" class="py-16 lg:py-24 bg-white/50 backdrop-blur-sm">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <h3 class="text-3xl font-bold text-center mb-12">Bestsellers</h3>
                <div class="swiper bestseller-swiper">
                    <div class="swiper-wrapper pb-4" id="bestseller-wrapper"></div>
                </div>
            </div>
        </section>

        <section id="combos-section" class="py-16 lg:py-24">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <h3 class="text-3xl font-bold text-center mb-12">CAPS Special Combos</h3>
                <div class="swiper combo-swiper">
                    <div class="swiper-wrapper pb-4" id="combo-wrapper"></div>
                </div>
            </div>
        </section>

        <section id="full-menu-section" class="py-16 lg:py-24 bg-white/50 backdrop-blur-sm">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-center items-center mb-10 space-x-4">
                    <span id="veg-toggle-text" class="font-semibold text-gray-700 transition-colors">All Items</span>
                    <input type="checkbox" id="veg-toggle" class="hidden peer">
                    <label for="veg-toggle" class="relative w-14 h-8 bg-rose-200 rounded-full cursor-pointer p-1 veg-toggle-label">
                        <div class="w-6 h-6 bg-rose-800 rounded-full shadow-md transform transition-transform veg-toggle-dot"></div>
                    </label>
                </div>
                <div class="space-y-12 mb-12">
                    <div class="swiper filter-swiper" id="cuisine-filter-container">
                         <div class="swiper-wrapper" id="cuisine-filter-wrapper"></div>
                    </div>
                    <div class="swiper filter-swiper" id="category-filter-container">
                         <div class="swiper-wrapper" id="category-filter-wrapper"></div>
                    </div>
                </div>
                <div id="menu-display-area" class="space-y-16"></div>
            </div>
        </section>
    </main>

    <script>

                {"id":18,"name":"Dragon Chicken","cuisines":["Chinese"],"categories":["Starters","Chicken"],"price":280,"info":"Spicy fried chicken starter.","isVeg":false,"isBestseller":true,"icon":"ph-fire","combos":["Chinese Dragon Combo"]},

                {"id":20,"name":"Peri Peri Chicken Pops","cuisines":["Continental"],"categories":["Starters","Chicken"],"price":290,"info":"Spicy bite-sized chicken pops.","isVeg":false,"isBestseller":true,"icon":"ph-popcorn","combos":[]},
                {"id":21,"name":"Honey Glazed Chicken","cuisines":["Asian"],"categories":["Starters","Chicken"],"price":290,"info":"Sweet and savory glazed chicken.","isVeg":false,"isBestseller":false,"icon":"ph-bird","combos":[]},
                {"id":22,"name":"Tawa Fried Prawns","cuisines":["Kerala"],"categories":["Starters","Seafood"],"price":320,"info":"Prawns pan-fried on a griddle.","isVeg":false,"isBestseller":true,"icon":"ph-shrimp","combos":[]},
                {"id":23,"name":"Hot Crispy Garlic Potato","cuisines":["Chinese"],"categories":["Starters","Vegetarian"],"price":180,"info":"Crispy potatoes in a garlic sauce.","isVeg":true,"isBestseller":false,"icon":"ph-potato","combos":[]},
                {"id":24,"name":"Mushroom Pepper Ularthu","cuisines":["Kerala"],"categories":["Starters","Vegetarian"],"price":200,"info":"Mushroom roast with black pepper.","isVeg":true,"isBestseller":false,"icon":"ph-mushroom","combos":[]},
                {"id":25,"name":"Momos (Fried / Steamed)","cuisines":["Tibetan"],"categories":["Starters"],"price":200,"info":"Veg or Chicken dumplings.","isVeg":true,"isBestseller":false,"icon":"ph-moped","combos":[]},
                {"id":26,"name":"Veg Meals","cuisines":["Kerala"],"categories":["Main Course","Vegetarian","Lunch"],"price":140,"info":"Traditional Kerala vegetarian thali.","isVeg":true,"isBestseller":false,"icon":"ph-leaf","combos":[]},
                {"id":27,"name":"Fish Curry Meals","cuisines":["Kerala"],"categories":["Main Course","Seafood","Lunch"],"price":160,"info":"Kerala meals with fish curry.","isVeg":false,"isBestseller":true,"icon":"ph-fish","combos":[]},

                {"id":29,"name":"Beef Biriyani","cuisines":["Biryani"],"categories":["Main Course","Beef","Lunch","Dinner"],"price":200,"info":"Flavorful beef biryani.","isVeg":false,"isBestseller":false,"icon":"ph-bowl-food","combos":["Biryani Bash"]},

                {"id":33,"name":"Chicken Fried Rice","cuisines":["Chinese"],"categories":["Main Course","Rice","Chicken"],"price":170,"info":"Classic chicken fried rice.","isVeg":false,"isBestseller":false,"icon":"ph-bird","combos":["Chinese Dragon Combo"]},
                {"id":34,"name":"Mixed Fried Rice","cuisines":["Chinese"],"categories":["Main Course","Rice"],"price":200,"info":"Fried rice with chicken, egg, and shrimp.","isVeg":false,"isBestseller":false,"icon":"ph-stack","combos":[]},
                {"id":35,"name":"Szechwan Veg Fried Rice","cuisines":["Chinese"],"categories":["Main Course","Rice","Vegetarian"],"price":150,"info":"Spicy Szechwan-style fried rice.","isVeg":true,"isBestseller":false,"icon":"ph-pepper","combos":[]},
                {"id":36,"name":"Chicken Kondattam","cuisines":["Kerala"],"categories":["Main Course","Chicken"],"price":260,"info":"Spicy dry fried chicken.","isVeg":false,"isBestseller":true,"icon":"ph-fire-simple","combos":[]},
                {"id":37,"name":"Malabari Kothi Roast","cuisines":["Kerala"],"categories":["Main Course","Chicken"],"price":250,"info":"Malabar style chicken roast.","isVeg":false,"isBestseller":false,"icon":"ph-moon","combos":["Malabar Combo"]},
                {"id":38,"name":"Butter Chicken Masala","cuisines":["North Indian"],"categories":["Main Course","Chicken"],"price":275,"info":"Creamy tomato-based chicken curry.","isVeg":false,"isBestseller":true,"icon":"ph-paint-bucket","combos":["North Indian Feast"]},
                {"id":39,"name":"Beef Coconut Ularthu","cuisines":["Kerala"],"categories":["Main Course","Beef"],"price":220,"info":"Beef roast with coconut pieces.","isVeg":false,"isBestseller":true,"icon":"ph-cube","combos":[]},
                {"id":40,"name":"Paneer Butter Masala","cuisines":["North Indian"],"categories":["Main Course","Vegetarian"],"price":210,"info":"Creamy paneer curry.","isVeg":true,"isBestseller":false,"icon":"ph-square-half","combos":["North Indian Feast"]},
                {"id":41,"name":"Kadai Vegetable","cuisines":["North Indian"],"categories":["Main Course","Vegetarian"],"price":210,"info":"Mixed vegetables in a wok.","isVeg":true,"isBestseller":false,"icon":"ph-carrot","combos":[]},
                {"id":42,"name":"Kerala Paratha","cuisines":["Kerala"],"categories":["Breads"],"price":17,"info":"Layered flatbread.","isVeg":true,"isBestseller":true,"icon":"ph-swatches","combos":["Malabar Combo"]},
                {"id":43,"name":"Wheat Paratha","cuisines":["North Indian"],"categories":["Breads"],"price":25,"info":"Whole wheat flatbread.","isVeg":true,"isBestseller":false,"icon":"ph-gear-six","combos":["North Indian Feast"]},
                {"id":44,"name":"Mix Berry Cooler","cuisines":["Beverages"],"categories":["Mocktails"],"price":100,"info":"Refreshing mixed berry drink.","isVeg":true,"isBestseller":false,"icon":"ph-brandy","combos":[]},
                {"id":45,"name":"Falooda","cuisines":["Beverages"],"categories":["Desserts"],"price":120,"info":"Rich dessert with vermicelli, ice cream, and nuts.","isVeg":true,"isBestseller":true,"icon":"ph-confetti","combos":[]}
            ];

            const cuisineColors = {
                "Kerala": "text-emerald-600", "South Indian": "text-green-600", "North Indian": "text-orange-600",
                "Chinese": "text-red-600", "Indo-Chinese": "text-rose-600", "Asian": "text-amber-600",
                "Continental": "text-sky-600", "Tibetan": "text-purple-600", "Biryani": "text-yellow-600",
                "Beverages": "text-blue-600", "Default": "text-slate-600"
            };

            let activeFilters = { cuisine: 'All', category: 'All', isVegOnly: false };

            const populateBestsellers = () => {
                const wrapper = document.getElementById('bestseller-wrapper');
                wrapper.innerHTML = menuData.filter(item => item.isBestseller).map(item => `
                    <div class="swiper-slide" style="width: 280px;">
                        <div class="bg-white p-6 rounded-xl shadow-lg text-center h-full border-b-4 border-amber-400">
                            <i class="ph-duotone ${item.icon} text-5xl text-amber-500 mb-4"></i>
                            <h4 class="font-bold text-lg">${item.name}</h4>
                            <p class="font-cinzel text-gray-700 mt-2">₹${item.price}</p>
                        </div>
                    </div>`).join('');
            };
            
            const populateCombos = () => {
                const wrapper = document.getElementById('combo-wrapper');
                const comboNames = [...new Set(menuData.flatMap(item => item.combos))];
                wrapper.innerHTML = comboNames.map(comboName => {
                    const comboItems = menuData.filter(item => item.combos.includes(comboName));
                    const totalPrice = comboItems.reduce((sum, item) => sum + item.price, 0);
                    return `
                        <div class="swiper-slide" style="width: 320px;">
                            <div class="bg-white rounded-xl shadow-lg p-6 h-full border-b-4 border-violet-400">
                                <div class="flex justify-between items-center mb-4">
                                    <h4 class="font-bold text-lg">${comboName}</h4>
                                    <p class="font-cinzel text-violet-600 font-bold">₹${totalPrice}</p>
                                </div>
                                <ul class="text-sm space-y-1 text-gray-600">
                                    ${comboItems.map(item => `<li>- ${item.name}</li>`).join('')}
                                </ul>
                            </div>
                        </div>`;
                }).join('');
            };

            const populateFilters = () => {
                const cuisineWrapper = document.getElementById('cuisine-filter-wrapper');
                const categoryWrapper = document.getElementById('category-filter-wrapper');
                const cuisines = ['All', ...new Set(menuData.flatMap(item => item.cuisines))];
                const categories = ['All', ...new Set(menuData.flatMap(item => item.categories))];

                cuisineWrapper.innerHTML = cuisines.map(c => `<div class="swiper-slide"><button class="cuisine-btn font-semibold text-gray-600 hover:text-gray-900 ${c === 'All' ? 'active' : ''}" data-filter="${c}">${c}</button></div>`).join('');
                categoryWrapper.innerHTML = categories.map(c => `<div class="swiper-slide"><button class="category-btn bg-white font-semibold text-gray-700 ${c === 'All' ? 'active' : ''}" data-filter="${c}">${c}</button></div>`).join('');
            };

            const renderMenu = () => {
                const displayArea = document.getElementById('menu-display-area');
                let sourceData = activeFilters.isVegOnly ? menuData.filter(item => item.isVeg) : menuData;
                let filteredItems = sourceData;

                if (activeFilters.cuisine !== 'All') filteredItems = filteredItems.filter(item => item.cuisines.includes(activeFilters.cuisine));
                if (activeFilters.category !== 'All') filteredItems = filteredItems.filter(item => item.categories.includes(activeFilters.category));

                if (filteredItems.length === 0) {
                    displayArea.innerHTML = `<p class="text-center text-gray-500 col-span-full">No items match your selection.</p>`;
                    return;
                }

                const groupedByCategory = filteredItems.reduce((groups, item) => {
                    const category = item.categories[0];
                    if (!groups[category]) groups[category] = [];
                    groups[category].push(item);
                    return groups;
                }, {});

                displayArea.innerHTML = Object.entries(groupedByCategory).map(([category, items]) => `
                    <div>
                        <h3 class="menu-category-title font-cinzel text-3xl font-bold mb-8"><span class="px-4 bg-white/50">${category}</span></h3>
                        <div class="grid md:grid-cols-2 gap-x-12 gap-y-8">
                            ${items.map(item => `
                                <div class="flex items-start space-x-4">
                                    <i class="ph-duotone ${item.icon} text-4xl ${cuisineColors[item.cuisines[0]] || cuisineColors.Default} flex-shrink-0"></i>
                                    <div class="flex-grow">
                                        <h4 class="font-bold text-lg">${item.name}</h4>
                                        <p class="text-sm text-gray-500">${item.info}</p>
                                    </div>
                                    <div class="flex-shrink-0 w-20 text-right font-cinzel text-gray-800 font-bold">₹${item.price}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
            };

            const addEventListeners = () => {
                document.getElementById('veg-toggle').addEventListener('change', (e) => {
                    activeFilters.isVegOnly = e.target.checked;
                    document.getElementById('veg-toggle-text').textContent = e.target.checked ? 'Pure Veg Only' : 'All Items';
                    renderMenu();
                });

                document.getElementById('cuisine-filter-wrapper').addEventListener('click', (e) => {
                    if (e.target.classList.contains('cuisine-btn')) {
                        document.querySelectorAll('.cuisine-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        activeFilters.cuisine = e.target.dataset.filter;
                        renderMenu();
                    }
                });
                document.getElementById('category-filter-wrapper').addEventListener('click', (e) => {
                     if (e.target.classList.contains('category-btn')) {
                        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        activeFilters.category = e.target.dataset.filter;
                        renderMenu();
                    }
                });
            };

            const initSwipers = () => {
                new Swiper('.bestseller-swiper', { slidesPerView: 'auto', spaceBetween: 24, freeMode: true, loop: true, autoplay: { delay: 3000, disableOnInteraction: false } });
                new Swiper('.combo-swiper', { slidesPerView: 'auto', spaceBetween: 24, freeMode: true });
                new Swiper('#cuisine-filter-container', { slidesPerView: 'auto', spaceBetween: 16, freeMode: true });
                new Swiper('#category-filter-container', { slidesPerView: 'auto', spaceBetween: 16, freeMode: true });
            };

            // --- INITIALIZE THE APP ---
            populateBestsellers();
            populateCombos();
            populateFilters();
            renderMenu();
            initSwipers();
            addEventListeners();
        });
    </script>
</body>
</html>
